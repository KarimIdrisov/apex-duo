<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apex Web</title>
  <!-- cache-bust the stylesheet each load: some static servers let the browser hard-cache style.css,
       which left the desktop layout stale on reload. document.write keeps it synchronous (no FOUC). -->
  <script>document.write('<link rel="stylesheet" href="style.css?v=' + Date.now() + '">');</script>
  <noscript><link rel="stylesheet" href="style.css" /></noscript>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>
  <header id="nav"></header>
  <div id="app"></div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
