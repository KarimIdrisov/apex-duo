<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Apex — редактор трассы</title>
<style>
  html,body{margin:0;height:100%;background:#11141a;color:#e8e8ea;font:14px system-ui,sans-serif;overflow:hidden}
  #wrap{display:flex;height:100%}
  #cv{background:#0b0d12;flex:1 1 0;min-width:0;touch-action:none;cursor:crosshair;display:block}
  #panel{flex:1;min-width:240px;max-width:300px;padding:14px;overflow:auto;border-left:1px solid #222}
  h2{font-size:15px;margin:0 0 10px} .row{margin:8px 0} button,select{font:inherit}
  button{background:#222733;color:#e8e8ea;border:1px solid #3a4150;border-radius:6px;padding:7px 10px;cursor:pointer}
  button:hover{background:#2c3340} button.on{background:#2d5a7a;border-color:#3d7aa0}
  #drive{width:100%} #drive.on{background:#7a2d2d;border-color:#a03d3d}
  select{background:#222733;color:#e8e8ea;border:1px solid #3a4150;border-radius:6px;padding:6px;width:100%}
  .hint{color:#8a909c;font-size:12px;line-height:1.5;margin-top:10px}
  #toast{position:fixed;bottom:16px;left:16px;background:#2d5a7a;padding:8px 12px;border-radius:6px;opacity:0;transition:opacity .25s}
</style></head>
<body><div id="wrap"><canvas id="cv"></canvas><div id="panel">
  <h2>Редактор трассы</h2>
  <div class="row"><select id="preset"></select></div>
  <div class="row"><canvas id="preview3d" style="width:100%;height:210px;background:#0b0d12;border-radius:6px;display:block"></canvas></div>
  <div class="row"><button id="refresh3d" style="width:100%">🔄 Обновить 3D</button></div>
  <div class="row"><b style="font-size:12px">Эталон (оригинал трассы):</b><br>
    <canvas id="svgref" style="width:100%;height:130px;background:#0b0d12;border-radius:6px;display:block"></canvas></div>
  <div class="row" id="modes"><button id="m-edit" class="on">Точки</button> <button id="m-pit">Пит</button> <button id="m-zones">Зоны</button></div>
  <div class="row" id="pitctl" hidden>Потеря в питах, с: <input id="pitloss" type="number" step="0.1" style="width:64px"><br>
    <span id="pithint" style="font-size:12px;color:#8a909c"></span><br>
    Пит-лейн: <button id="pit-side">сторона ◀</button> ширина <input id="pit-width" type="range" min="1" max="4" step="0.25" value="2.5" style="width:90px"></div>
  <div class="row" id="zonectl" hidden><button id="z-brake">+ тормозная</button> <button id="z-slip">+ слипстрим</button> <button id="autozones">🎯 Авто</button><br>
    <span id="zonelist" style="font-size:12px"></span><br>ease: <input id="z-ease" type="range" min="0" max="1" step="0.05" value="0.5" style="width:120px"></div>
  <div class="row"><button id="drive">▶ Прокатить</button></div>
  <div class="row"><button id="race" style="width:100%;background:#2d7a3a;border-color:#3da050">🏁 Гонять (сим)</button></div>
  <div class="row"><button id="fit">⊡ По размеру</button></div>
  <div class="row"><button id="save">💾 Сохранить</button> <button id="reset">↺ Сброс</button></div>
  <div class="row"><button id="publish" style="width:100%;background:#2d5a7a;border-color:#3d7aa0">📤 Опубликовать на гит</button></div>
  <div class="row" id="palette"><b style="font-size:12px">Объекты:</b><br></div>
  <div class="row"><button id="export">⬇ Экспорт JSON</button> <button id="import">⬆ Импорт</button>
    <input id="file" type="file" accept="application/json" hidden></div>
  <div class="hint" id="hint"></div>
</div></div><div id="toast"></div>
<script type="module" src="src/ui/editor.js"></script></body></html>
